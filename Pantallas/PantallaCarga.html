<body class="bg-background text-on-surface font-body-md overflow-hidden antialiased">
<!-- Splash Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center stadium-glow overflow-hidden">
<!-- Background Imagery -->
<div class="absolute inset-0 z-0 pitch-texture opacity-40"></div>
<div class="absolute inset-0 z-1 grass-pattern"></div>
<!-- Goal Post Silhouette -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[120%] h-1/2 opacity-20 z-1 pointer-events-none">
<svg class="w-full h-full" fill="none" viewbox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
<path d="M100 400V100H700V400" stroke="white" stroke-linecap="square" stroke-width="8"></path>
<path d="M100 100L50 50M700 100L750 50" stroke="white" stroke-dasharray="10 10" stroke-width="4"></path>
<rect fill="url(#net-pattern)" fill-opacity="0.1" height="300" width="600" x="100" y="100"></rect>
<defs>
<pattern height="20" id="net-pattern" patternunits="userSpaceOnUse" width="20" x="0" y="0">
<path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="1"></path>
</pattern>
</defs>
</svg>
</div>
<!-- Content Container -->
<div class="relative z-10 flex flex-col items-center space-y-xl px-lg max-w-md w-full">

<span class="material-symbols-outlined text-[64px] text-yellow-500" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
<h1 class="text-headline-xl font-headline-xl italic text-yellow-500 drop-shadow-[0_0_15px_rgba(234,179,8,0.6)] tracking-tighter uppercase">FutKO</h1>
</div>
<!-- Loading Message -->
<div class="flex flex-col items-center gap-md w-full">
<p class="text-label-bold font-label-bold text-primary tracking-[0.2em] uppercase animate-pulse">
                    CALENTANDO MOTORES...
                </p>
<!-- Field Line Progress Bar -->
<div class="relative w-full h-4 bg-white/10 rounded-full border border-white/20 overflow-hidden shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]">
<!-- The Pitch "Grass" Fill -->
<div class="absolute inset-y-0 left-0 bg-gradient-to-r from-emerald-800 to-emerald-500 w-[65%] flex items-center justify-end pr-1 shadow-[0_0_15px_rgba(16,185,129,0.5)]">
<!-- Soccer Ball Scrubber -->
<div class="relative w-6 h-6 -mr-3 bg-white rounded-full flex items-center justify-center shadow-lg border border-gray-300">
<span class="material-symbols-outlined text-[16px] text-black">sports_soccer</span>
</div>
</div>
<!-- Pitch Markings (Center Circle/Lines) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30">
<div class="h-full w-px bg-white"></div>
<div class="w-8 h-8 rounded-full border border-white"></div>
</div>
</div>
</div>
<!-- Footer Stats Hint (Bento-style snippet) -->

<div class="bg-surface-container-low/60 backdrop-blur-sm border border-white/10 rounded-xl p-md flex flex-col items-center justify-center">

<span class="text-on-surface-variant text-[10px] uppercase font-bold tracking-widest">Goles</span>
</div>
<div class="bg-surface-container-low/60 backdrop-blur-sm border border-white/10 rounded-xl p-md flex flex-col items-center justify-center">
<span class="text-secondary text-headline-md font-headline-md">50+</span>
<span class="text-on-surface-variant text-[10px] uppercase font-bold tracking-widest">Ligas</span>
</div>
</div>
</div>
<!-- Decorative Floaters -->
<div class="absolute top-1/4 -right-12 w-32 h-32 bg-yellow-500/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-1/4 -left-12 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl"></div>
</main>
