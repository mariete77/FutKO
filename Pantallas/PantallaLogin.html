<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Lexend:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .stadium-glow {
            box-shadow: 0 0 60px 10px rgba(234, 179, 8, 0.15);
        }
        .pitch-line {
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 100% 40px;
        }
        .grass-texture {
            background-color: #121414;
            background-image: radial-gradient(#1a1c1c 0.5px, transparent 0.5px);
            background-size: 4px 4px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#1a1c1c",
                        "on-secondary-container": "#725f00",
                        "primary": "#accfb3",
                        "surface-container-highest": "#333535",
                        "on-secondary-fixed-variant": "#544600",
                        "on-surface": "#e2e2e2",
                        "outline-variant": "#424842",
                        "on-tertiary-fixed": "#2e1500",
                        "tertiary-container": "#402000",
                        "surface-tint": "#accfb3",
                        "background": "#121414",
                        "on-secondary-fixed": "#221b00",
                        "inverse-surface": "#e2e2e2",
                        "surface-container-lowest": "#0c0f0f",
                        "surface-variant": "#333535",
                        "surface-container-high": "#282a2b",
                        "on-error-container": "#ffdad6",
                        "outline": "#8c928b",
                        "on-primary": "#183623",
                        "inverse-primary": "#46654f",
                        "on-tertiary-container": "#ca7d30",
                        "inverse-on-surface": "#2f3131",
                        "on-tertiary-fixed-variant": "#6c3a00",
                        "surface-bright": "#38393a",
                        "error": "#ffb4ab",
                        "tertiary": "#ffb779",
                        "tertiary-fixed-dim": "#ffb779",
                        "surface-dim": "#121414",
                        "surface-container": "#1e2020",
                        "on-primary-fixed": "#02210f",
                        "on-secondary": "#3a3000",
                        "on-tertiary": "#4c2700",
                        "surface": "#121414",
                        "on-surface-variant": "#c2c8c0",
                        "secondary-container": "#ffdb3c",
                        "primary-container": "#0f2e1b",
                        "on-primary-fixed-variant": "#2f4d38",
                        "secondary-fixed-dim": "#e9c400",
                        "on-error": "#690005",
                        "secondary": "#fff9ef",
                        "primary-fixed": "#c8ebce",
                        "on-primary-container": "#76977e",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#ffdcc1",
                        "on-background": "#e2e2e2",
                        "primary-fixed-dim": "#accfb3",
                        "secondary-fixed": "#ffe16d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "md": "16px",
                        "xl": "40px",
                        "sm": "8px",
                        "container-max": "1200px",
                        "unit": "4px",
                        "lg": "24px",
                        "gutter": "20px"
                    },
                    "fontFamily": {
                        "body-lg": ["Lexend"],
                        "label-bold": ["Lexend"],
                        "body-md": ["Lexend"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-bold": ["14px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface selection:bg-secondary-container selection:text-on-secondary-container overflow-hidden">
<!-- Hero Background Wrapper with Stadium Atmosphere -->
<div class="relative min-h-screen flex items-center justify-center grass-texture overflow-hidden">
<!-- Background Imagery / Atmosphere Layers -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-30 grayscale mix-blend-overlay" data-alt="A cinematic, wide-angle shot of a legendary football stadium at night under intense floodlights. The perspective is from the turf level, looking up at the towering stands shrouded in a mysterious dark fog. Golden atmospheric lighting beams cut through the air, creating a high-stakes championship atmosphere. The color palette is dominated by deep emerald greens and rich charcoals with brilliant golden accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDDOdJdqMzzuV4VkRpHDBliIkrTR06f_xUa3pOoIFfC_m_4o0Xcu7zvfoqSRJU31xYVLZE9Nf9JblIhrtF72h-hw_-kk9R9tKpSvbra9tuKaGVuI3LTMipQyrL9lFogiMMqLwuCluGOBdGN-ne8pc8dKIcUq_z67FpXBrMzOEyelXtF3s2oblYAW11PVptz5TYkQh7lRUnBX5aUG6FLUcEm4_KH92V-B3kgFcm7APeN3hQv7QRFih91-T1dNBo0kNOpsGpiOH8110sR"/>
<div class="absolute inset-0 bg-gradient-to-b from-background/80 via-transparent to-background"></div>
<div class="absolute inset-0 bg-gradient-to-r from-background via-transparent to-background"></div>
</div>
<!-- Login Canvas -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Brand Section -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-5xl text-secondary-fixed drop-shadow-[0_0_15px_rgba(255,225,109,0.5)]" data-icon="sports_soccer" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-secondary-fixed italic tracking-tighter uppercase drop-shadow-[0_0_20px_rgba(234,179,8,0.4)]">
                    FutKO
                </h1>
<p class="font-body-md text-on-surface-variant mt-sm tracking-wide opacity-80">
                    WHERE CHAMPIONS ENTER THE FIELD
                </p>
</div>
<!-- Login Card (Pitch Container) -->
<div class="bg-surface-container-low/80 backdrop-blur-xl border border-outline-variant/30 rounded-xl p-lg shadow-2xl stadium-glow">
<!-- Tactical Decoration -->
<div class="flex justify-center mb-lg">
<div class="h-1 w-16 bg-secondary-fixed/30 rounded-full"></div>
</div>
<form class="space-y-lg">
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-bold text-label-bold text-on-surface/70 flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" data-icon="alternate_email">alternate_email</span>
                            EMAIL ADDRESS
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border-2 border-outline-variant/50 rounded-lg px-md py-4 text-on-surface focus:border-secondary-fixed focus:ring-0 transition-all outline-none placeholder:text-on-surface-variant/40 font-body-md" placeholder="manager@futko.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-end">
<label class="font-label-bold text-label-bold text-on-surface/70 flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
                                PASSWORD
                            </label>
<a class="text-[12px] font-label-bold text-secondary-fixed hover:text-secondary-container transition-colors" href="#">FORGOT?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border-2 border-outline-variant/50 rounded-lg px-md py-4 text-on-surface focus:border-secondary-fixed focus:ring-0 transition-all outline-none placeholder:text-on-surface-variant/40 font-body-md" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Kick Off Button -->
<button class="group relative w-full mt-xl bg-gradient-to-b from-secondary-fixed to-on-secondary-container text-on-secondary-fixed font-headline-md text-headline-md py-lg rounded-xl shadow-[0_4px_0_0_#544600] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-md" type="submit">
<span class="material-symbols-outlined text-2xl group-hover:rotate-45 transition-transform" data-icon="sports_soccer" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
                        KICK OFF
                    </button>
</form>
<!-- Footer Links -->
<div class="mt-xl pt-lg border-t border-outline-variant/20 text-center">
<p class="font-body-md text-on-surface-variant">
                        New to the stadium? 
                        <a class="text-secondary-fixed font-label-bold ml-xs hover:underline decoration-secondary-fixed/50" href="#">CREATE SQUAD</a>
</p>
</div>
</div>
<!-- Social/Third Party Login -->
<div class="mt-lg grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm bg-surface-container-high/40 border border-outline-variant/20 rounded-lg py-md hover:bg-surface-container-highest transition-colors">
<img alt="Google Logo" class="w-5 h-5" data-alt="A precise, high-resolution vector logo of Google with its signature multicolored 'G' mark. The graphic is clean and centered on a transparent background, suitable for modern dark mode UI design integration." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwUyTvvsQcb-dwfONOMm_O89_RuPqi2JzYrbAWhtfBi4YgW2X471Hlys0Ego7CNPZImaDQlMK2xvCU_x_ykHk2BX0o3BtsRaGm-4VUdnpveJDQfMT56IQZYGXyydU2xP-WgfEykfms4WVap7bT0S76gT6GhcIKsjVMcB1Mftl7JCBsXjx1lpEGwFo-tnTRNYKCE7brHzG6afoT5HWypmo6gY1XmbaSEXAx7NgZtk7kix0NkU0YTlP4T1Qq_703mpqzxaXN1I9xF97d"/>
<span class="font-label-bold text-[12px] text-on-surface/80">GOOGLE</span>
</button>
<button class="flex items-center justify-center gap-sm bg-surface-container-high/40 border border-outline-variant/20 rounded-lg py-md hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-xl text-white" data-icon="apple">ios</span>
<span class="font-label-bold text-[12px] text-on-surface/80">APPLE ID</span>
</button>
</div>
<!-- Quick Tip (Tactical Note) -->
<div class="mt-xl flex items-start gap-md bg-primary-container/20 p-md rounded-lg border border-primary/20">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
<p class="text-[12px] font-body-md text-on-primary-container leading-tight">
<strong class="text-primary block mb-1">PRO TIP</strong>
                    Ensure your squad credentials are secure. Champions never leave their goal undefended.
                </p>
</div>
</main>
<!-- Stadium Floor Lighting Effect -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[800px] h-[300px] bg-secondary-fixed/5 rounded-[100%] blur-[120px] pointer-events-none z-0"></div>
</div>
</body></html>
